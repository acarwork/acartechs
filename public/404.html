<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sayfa bulunamadı | Acartechs</title>
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://acartechs.com/">
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(38,201,244,.18), transparent 34%),
        radial-gradient(circle at bottom right, rgba(33,136,246,.16), transparent 40%),
        #f8fafc;
      color: #0f172a;
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      background: #fff;
      border: 1px solid #dbeafe;
      border-radius: 18px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, .08);
      padding: 36px 32px;
      text-align: center;
    }
    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #2188f6, #26c9f4);
      color: #fff;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding: 7px 14px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.15;
    }
    p {
      margin: 0 0 24px;
      color: #475569;
      line-height: 1.65;
      font-size: 16px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    a {
      text-decoration: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 800;
      font-size: 14px;
    }
    .primary {
      background: linear-gradient(135deg, #2188f6, #26c9f4);
      color: #fff;
      box-shadow: 0 10px 24px rgba(33,136,246,.28);
    }
    .ghost {
      background: #f1f5f9;
      color: #0f172a;
      border: 1px solid #e2e8f0;
    }
  </style>
<link rel="stylesheet" href="/assets/acartechs-live.css?v=2" />
</head>
<body>
  <main class="card">
    <div class="kicker">404</div>
    <h1>Aradığın sayfa burada değil</h1>
    <p>
      Bağlantı eski kalmış veya yazım hatası olabilir. Ana sayfaya dönüp
      güncel teknoloji haberlerine göz atabilirsin.
    </p>
    <div class="actions">
      <a class="primary" href="/">Ana sayfaya dön</a>
      <a class="ghost" href="/haberler/">Tüm haberler</a>
      <a class="ghost" href="/yapay-zeka/">Yapay zekâ</a>
    </div>
  </main>
<script defer src="/assets/acartechs-live.js?v=2"></script>
</body>
</html>
