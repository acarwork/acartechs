<!doctype html>
<html lang="tr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>Dx Ball – AcarTechs Arcade</title>
	<link rel="canonical" href="https://acartechs.com/dx-ball/">
	<meta name="description" content="Dx Ball mini oyunu. Tam sayfa arcade deneyimi.">
	<meta property="og:site_name" content="Acartechs">
	<meta property="og:title" content="Dx Ball – AcarTechs Arcade">
	<meta property="og:description" content="Dx Ball mini oyunu. Tam sayfa arcade deneyimi.">
	<meta property="og:type" content="website">
	<meta property="og:url" content="https://acartechs.com/dx-ball/">
	<meta name="twitter:card" content="summary">
	<link rel="stylesheet" href="/wp-content/themes/blocksy/acartechs-home.min.css?ver=1784749699" media="all" />
	<style id="acartechs-static-hosting">.acartechs-login,.acartechs-login-modal{display:none!important}</style>
</head>
<body class="acartechs-game-body">
<a class="skip-link screen-reader-text" href="#game-main">Skip to content</a>
<main class="acartechs-game-shell" id="game-main">
	<header class="acartechs-game-bar">
		<a class="acartechs-game-brand" href="/" aria-label="AcarTechs ana sayfa">
			<span class="acartechs-game-brand-mark">a</span>
			<span>acartechs</span>
		</a>
		<nav class="acartechs-game-bar-nav" aria-label="Oyun gezinme">
			<a href="/mini-oyunlar/">Mini Oyunlar</a>
			<a href="/oyun/">Oyun Haberleri</a>
		</nav>
	</header>	<section class="acartechs-game-fill acartechs-dxball-fill" data-acartechs-tool="dx-ball" aria-label="Dx Ball">
		<div class="acartechs-game-chrome">
			<div class="acartechs-game-title">
				<strong>Dx Ball</strong>
				<span data-dx-status>Hazır</span>
			</div>
			<div class="acartechs-game-stats" role="status">
				<div><span>Skor</span><strong data-dx-score>0</strong></div>
				<div><span>En iyi</span><strong data-dx-best>0</strong></div>
				<div><span>Can</span><strong data-dx-lives>3</strong></div>
				<div><span>Seviye</span><strong data-dx-level>1</strong></div>
			</div>
			<div class="acartechs-game-actions">
				<button type="button" class="is-primary" data-dx-start>Başlat</button>
				<button type="button" data-dx-pause>Duraklat</button>
				<button type="button" data-dx-reset>Sıfırla</button>
			</div>
		</div>
		<div class="acartechs-game-stage">
			<canvas id="acartechs-dxball" width="520" height="680" aria-label="Dx Ball"></canvas>
		</div>
		<p class="acartechs-game-hint">← → / A D raket · Space fırlat/duraklat · Mouse veya dokunmatik</p>
	</section>
</main>
<script src="/assets/dx-ball.js?ver=3"></script>
</body>
</html>
