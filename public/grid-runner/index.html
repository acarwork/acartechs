<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<title>Grid Runner – AcarTechs Arcade</title>
<meta name="description" content="Retro neon şerit koşusu. 3 şerit, seviye sistemi, can, power-up, skor ve tam dokunmatik destek." />
<link rel="canonical" href="https://acartechs.com/grid-runner/" />
<style>
  :root {
    --bg0: #04060f;
    --bg1: #0a1230;
    --neon: #22d3ee;
    --neon2: #a78bfa;
    --pink: #f472b6;
    --gold: #fbbf24;
    --lime: #4ade80;
    --text: #eef6ff;
    --muted: #94a3b8;
    --panel: rgba(6, 12, 28, 0.9);
    --line: rgba(125, 211, 252, 0.22);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background:
      radial-gradient(1000px 600px at 20% 0%, #1e1b4b 0%, transparent 55%),
      radial-gradient(900px 500px at 90% 30%, #0e7490 0%, transparent 50%),
      linear-gradient(165deg, var(--bg0), var(--bg1) 55%, #050a16);
    color: var(--text);
    font-family: Inter, Segoe UI, system-ui, sans-serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #app { position: relative; width: 100%; height: 100%; min-height: 100dvh; }
  canvas#game {
    display: block; width: 100%; height: 100%;
    cursor: none; object-fit: contain; background: #03060f;
  }
  .screen {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center;
    padding: 20px; z-index: 5;
  }
  .screen.is-on { display: flex; }
  .panel {
    width: min(520px, 100%);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 20px;
    box-shadow: 0 0 0 1px rgba(255,255,255,.04), 0 30px 80px rgba(0,0,0,.45), 0 0 60px rgba(34,211,238,.08);
    padding: 28px 24px 22px;
    backdrop-filter: blur(14px);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .panel::before {
    content: "";
    position: absolute; inset: -40% -20% auto -20%; height: 70%;
    background:
      radial-gradient(circle at 30% 40%, rgba(34,211,238,.18), transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(167,139,250,.16), transparent 45%);
    pointer-events: none;
  }
  .panel > * { position: relative; z-index: 1; }
  .logo {
    font-size: clamp(36px, 8vw, 56px);
    font-weight: 900;
    letter-spacing: .04em;
    line-height: 1;
    background: linear-gradient(90deg, #67e8f9, #a78bfa 50%, #f472b6 95%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 6px;
    animation: logoPulse 3.2s ease-in-out infinite;
  }
  .logo small {
    display: block; margin-top: 8px; font-size: 12px;
    letter-spacing: .28em; color: var(--neon); font-weight: 800;
  }
  @keyframes logoPulse {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(34,211,238,.25)); }
    50% { filter: drop-shadow(0 0 18px rgba(167,139,250,.45)); }
  }
  .tagline { color: var(--muted); font-size: 14px; margin: 10px 0 20px; line-height: 1.5; }
  .genre {
    display: inline-block;
    margin-bottom: 10px;
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid rgba(34,211,238,.35);
    background: rgba(34,211,238,.1);
    color: var(--neon);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: .12em;
    text-transform: uppercase;
  }
  .btn-col { display: grid; gap: 10px; }
  .btn {
    appearance: none;
    border: 1px solid rgba(125,211,252,.28);
    background: linear-gradient(180deg, rgba(56,189,248,.16), rgba(15,23,42,.5));
    color: var(--text);
    font-weight: 800; font-size: 15px; letter-spacing: .04em;
    border-radius: 12px; padding: 14px 16px; cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .btn:hover {
    transform: translateY(-1px);
    border-color: rgba(34,211,238,.6);
    box-shadow: 0 10px 28px rgba(34,211,238,.15);
  }
  .btn.primary {
    background: linear-gradient(135deg, #22d3ee, #818cf8 55%, #c084fc);
    color: #06101f; border: none;
    box-shadow: 0 12px 30px rgba(99,102,241,.35);
  }
  .btn.ghost { background: transparent; }
  .btn.danger {
    background: linear-gradient(135deg, #fb7185, #e11d48);
    border: none; color: #fff;
  }
  .lang-row { display: grid; gap: 8px; justify-items: center; margin: 0 0 16px; }
  .lang-row .lang-label {
    color: var(--muted); font-size: 11px; font-weight: 800;
    letter-spacing: .14em; text-transform: uppercase;
  }
  .lang-switch {
    display: inline-grid; grid-template-columns: 1fr 1fr; gap: 8px; min-width: 128px;
  }
  .lang-switch button {
    appearance: none;
    border: 1px solid rgba(125,211,252,.28);
    background: linear-gradient(180deg, rgba(56,189,248,.14), rgba(15,23,42,.55));
    color: var(--muted); font-size: 12px; font-weight: 900;
    letter-spacing: .1em; border-radius: 10px; padding: 11px 14px; cursor: pointer;
  }
  .lang-switch button.is-on {
    background: linear-gradient(135deg, rgba(34,211,238,.32), rgba(129,140,248,.34));
    border-color: rgba(34,211,238,.7);
    box-shadow: 0 0 0 1px rgba(34,211,238,.18), 0 10px 24px rgba(56,189,248,.2);
    color: #fff;
  }
  .menu-tools {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 16px; gap: 10px;
  }
  .sound-toggle {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer;
    background: rgba(255,255,255,.04); border: 1px solid var(--line);
    border-radius: 999px; padding: 8px 12px;
  }
  .sound-toggle.is-on { color: var(--neon); border-color: rgba(34,211,238,.45); }
  .howto {
    text-align: left; color: #cbd5e1; font-size: 14px;
    line-height: 1.55; margin: 8px 0 18px;
  }
  .howto li { margin: 0 0 8px 18px; }
  .hud {
    position: absolute; top: 12px; left: 12px; right: 12px;
    z-index: 6; display: none; pointer-events: none;
    gap: 8px; justify-content: space-between; align-items: flex-start;
  }
  .hud.is-on { display: flex; }
  .hud-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    background: rgba(2, 8, 20, .72); border: 1px solid var(--line);
    border-radius: 999px; padding: 7px 11px; font-size: 12px;
    font-weight: 800; letter-spacing: .03em;
    backdrop-filter: blur(8px); color: #e2e8f0;
  }
  .chip b { color: var(--neon); margin-left: 4px; }
  .hud-actions { display: flex; gap: 6px; pointer-events: auto; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 12px;
    border: 1px solid var(--line); background: rgba(2, 8, 20, .78);
    color: #e2e8f0; font-size: 14px; font-weight: 900; cursor: pointer;
  }
  .icon-btn:hover { border-color: var(--neon); color: var(--neon); }
  .overlay-msg {
    position: absolute; left: 50%; top: 42%;
    transform: translate(-50%, -50%); z-index: 4;
    display: none; text-align: center; pointer-events: none;
    text-shadow: 0 8px 30px rgba(0,0,0,.55);
  }
  .overlay-msg.is-on { display: block; }
  .overlay-msg h2 {
    font-size: clamp(28px, 6vw, 44px); font-weight: 900;
    letter-spacing: .06em; margin-bottom: 8px;
  }
  .overlay-msg p { color: var(--muted); font-weight: 600; }
  .mobile-hint {
    position: absolute; left: 50%; bottom: 18px; transform: translateX(-50%);
    z-index: 6; display: none; pointer-events: none;
    color: rgba(226,232,240,.55); font-size: 12px; font-weight: 700;
    letter-spacing: .04em; text-align: center;
  }
  .mobile-hint.is-on { display: block; }
  .fs-note { margin-top: 10px; font-size: 12px; color: var(--muted); }
  @media (max-width: 640px) {
    .panel { padding: 22px 16px 16px; border-radius: 16px; }
    .chip { font-size: 11px; padding: 6px 9px; }
    .icon-btn { width: 36px; height: 36px; }
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="game" width="480" height="720" aria-label="Grid Runner oyun alani"></canvas>

  <div class="hud" id="hud">
    <div class="hud-group">
      <div class="chip"><span data-i18n="hudScore">SKOR</span> <b id="hudScore">0</b></div>
      <div class="chip"><span data-i18n="hudLives">CAN</span> <b id="hudLives">3</b></div>
      <div class="chip"><span data-i18n="hudLevel">LEVEL</span> <b id="hudLevel">1</b></div>
      <div class="chip"><span data-i18n="hudDist">MESAFE</span> <b id="hudDist">0</b></div>
    </div>
    <div class="hud-actions">
      <button class="icon-btn" id="btnPause" type="button" data-i18n-title="titlePause" title="Duraklat (P)">II</button>
      <button class="icon-btn" id="btnSoundHud" type="button" data-i18n-title="titleSound" title="Ses">🔊</button>
      <button class="icon-btn" id="btnExit" type="button" data-i18n-title="titleExit" title="ESC / Çıkış">✕</button>
    </div>
  </div>

  <div class="overlay-msg" id="toast"><h2 id="toastTitle"></h2><p id="toastText"></p></div>
  <div class="mobile-hint" id="mobileHint" data-i18n="mobileHint">Kaydır / dokun · sol-sağ şerit</div>

  <section class="screen is-on" id="screenMenu">
    <div class="panel">
      <div class="logo">GRID RUNNER<small>ACARTECHS ARCADE</small></div>
      <span class="genre" data-i18n="genre">Koşu · Refleks / Aksiyon</span>
      <p class="tagline" data-i18n="tagline">90’lar neon grid · 2026 canvas · şerit koşusu</p>
      <div class="lang-row">
        <span class="lang-label" data-i18n="langLabel">Dil / Language</span>
        <div class="lang-switch" role="group" aria-label="Language / Dil">
          <button type="button" id="btnLangTr" class="is-on" data-lang="tr">TR</button>
          <button type="button" id="btnLangEn" data-lang="en">EN</button>
        </div>
      </div>
      <div class="btn-col">
        <button class="btn primary" id="btnStart" type="button" data-i18n="btnStart">BAŞLA</button>
        <button class="btn" id="btnFullscreen" type="button" data-i18n="btnFullscreen">TAM EKRANDA OYNA</button>
        <button class="btn" id="btnHow" type="button" data-i18n="btnHow">NASIL OYNANIR</button>
        <button class="btn ghost" id="btnExitMenu" type="button" data-i18n="btnExitMenu">ÇIKIŞ / ARCADE’E DÖN</button>
      </div>
      <div class="menu-tools">
        <button class="sound-toggle is-on" id="btnSoundMenu" type="button">🔊 Ses: Açık</button>
        <span class="fs-note" data-i18n="fsNote">ESC = menü · P = pause</span>
      </div>
    </div>
  </section>

  <section class="screen" id="screenHow">
    <div class="panel">
      <div class="logo" style="font-size:34px" data-i18n="howTitle">NASIL OYNANIR</div>
      <ul class="howto" id="howList"></ul>
      <div class="btn-col">
        <button class="btn primary" id="btnHowBack" type="button" data-i18n="btnBackMenu">MENÜYE DÖN</button>
      </div>
    </div>
  </section>

  <section class="screen" id="screenPause">
    <div class="panel">
      <div class="logo" style="font-size:40px" data-i18n="pauseTitle">DURAKLATILDI</div>
      <p class="tagline" data-i18n="pauseTag">Oyun duraklatıldı</p>
      <div class="btn-col">
        <button class="btn primary" id="btnResume" type="button" data-i18n="btnResume">DEVAM ET</button>
        <button class="btn" id="btnRestart" type="button" data-i18n="btnRestart">YENİDEN BAŞLAT</button>
        <button class="btn" id="btnPauseMenu" type="button" data-i18n="btnMainMenu">ANA MENÜYE DÖN</button>
        <button class="btn danger" id="btnPauseExit" type="button" data-i18n="btnExit">ÇIKIŞ</button>
      </div>
    </div>
  </section>

  <section class="screen" id="screenOver">
    <div class="panel">
      <div class="logo" style="font-size:36px" id="overTitle">GAME OVER</div>
      <p class="tagline" id="overStats">Skor: 0 · Level: 1</p>
      <div class="btn-col">
        <button class="btn primary" id="btnReplay" type="button" data-i18n="btnReplay">TEKRAR OYNA</button>
        <button class="btn" id="btnOverMenu" type="button" data-i18n="btnMainMenu">ANA MENÜYE DÖN</button>
        <button class="btn ghost" id="btnOverHome" type="button" data-i18n="btnArcadeHome">ARCADE ANA SAYFA</button>
      </div>
    </div>
  </section>
</div>

<script>
(function () {
  "use strict";

  var LANG = "tr";
  var I18N = {
    tr: {
      genre: "Koşu · Refleks / Aksiyon",
      tagline: "90’lar neon grid · 2026 canvas · şerit koşusu",
      langLabel: "Dil / Language",
      btnStart: "BAŞLA",
      btnFullscreen: "TAM EKRANDA OYNA",
      btnHow: "NASIL OYNANIR",
      btnExitMenu: "ÇIKIŞ / ARCADE’E DÖN",
      soundOn: "🔊 Ses: Açık",
      soundOff: "🔇 Ses: Kapalı",
      fsNote: "ESC = menü · P = pause",
      howTitle: "NASIL OYNANIR",
      howItems: [
        "<b>Tür:</b> 3 şeritli neon koşu · refleks / aksiyon",
        "<b>Kontrol:</b> ← → / A D · fare tıkla (şerit) · dokunmatik kaydır",
        "<b>Atlama:</b> Space / W / ↑ · ekranın üst yarısına dokun",
        "<b>Skor:</b> mesafe + enerji topları (+50) · engel yok etme yok — kaçın",
        "<b>Seviye:</b> her 500 m yeni level · hız ve engel yoğunluğu artar",
        "<b>Can:</b> 3 can · engel çarpması can düşürür (kalkan varken değil)",
        "<b>Power-up:</b> 🛡️ Kalkan · ⏱️ Yavaşlat · 🧲 Mıknatıs · ✨ x2 skor",
        "<b>Hedef:</b> mümkün olduğunca uzağa git · oturum en iyi skoru kır"
      ],
      btnBackMenu: "MENÜYE DÖN",
      pauseTitle: "DURAKLATILDI",
      pauseTag: "Oyun duraklatıldı",
      btnResume: "DEVAM ET",
      btnRestart: "YENİDEN BAŞLAT",
      btnMainMenu: "ANA MENÜYE DÖN",
      btnExit: "ÇIKIŞ",
      btnReplay: "TEKRAR OYNA",
      btnArcadeHome: "ARCADE ANA SAYFA",
      hudScore: "SKOR",
      hudLives: "CAN",
      hudLevel: "LEVEL",
      hudDist: "MESAFE",
      titlePause: "Duraklat (P)",
      titleSound: "Ses",
      titleExit: "ESC / Çıkış",
      gameOver: "OYUN BİTTİ",
      congrats: "TEBRİKLER!",
      stats: "Skor: {score}  ·  Level: {level}  ·  Mesafe: {dist}m  ·  Oturum en iyi: {best}",
      levelReady: "LEVEL {n}",
      levelReadySub: "Hız artıyor — hazır ol!",
      lifeLost: "CAN -1",
      livesLeft: "Kalan: {n}",
      powerShield: "KALKAN",
      powerSlow: "YAVAŞ",
      powerMagnet: "MIKNATIS",
      powerMulti: "x2 SKOR",
      mobileHint: "Kaydır / dokun · sol-sağ şerit · üst = zıpla"
    },
    en: {
      genre: "Runner · Reflex / Action",
      tagline: "90s neon grid · 2026 canvas · lane runner",
      langLabel: "Language / Dil",
      btnStart: "START",
      btnFullscreen: "PLAY FULLSCREEN",
      btnHow: "HOW TO PLAY",
      btnExitMenu: "EXIT / BACK TO ARCADE",
      soundOn: "🔊 Sound: On",
      soundOff: "🔇 Sound: Off",
      fsNote: "ESC = menu · P = pause",
      howTitle: "HOW TO PLAY",
      howItems: [
        "<b>Genre:</b> 3-lane neon runner · reflex / action",
        "<b>Move:</b> ← → / A D · click a lane · swipe on mobile",
        "<b>Jump:</b> Space / W / ↑ · tap top half of screen",
        "<b>Score:</b> distance + energy orbs (+50) · avoid obstacles",
        "<b>Levels:</b> every 500 m · speed and density rise",
        "<b>Lives:</b> 3 lives · hit = −1 life (unless shielded)",
        "<b>Power-ups:</b> 🛡️ Shield · ⏱️ Slow · 🧲 Magnet · ✨ x2 score",
        "<b>Goal:</b> go as far as you can · beat session best"
      ],
      btnBackMenu: "BACK TO MENU",
      pauseTitle: "PAUSED",
      pauseTag: "Game paused",
      btnResume: "RESUME",
      btnRestart: "RESTART",
      btnMainMenu: "MAIN MENU",
      btnExit: "EXIT",
      btnReplay: "PLAY AGAIN",
      btnArcadeHome: "ARCADE HOME",
      hudScore: "SCORE",
      hudLives: "LIVES",
      hudLevel: "LEVEL",
      hudDist: "DIST",
      titlePause: "Pause (P)",
      titleSound: "Sound",
      titleExit: "ESC / Exit",
      gameOver: "GAME OVER",
      congrats: "CONGRATS!",
      stats: "Score: {score}  ·  Level: {level}  ·  Dist: {dist}m  ·  Session best: {best}",
      levelReady: "LEVEL {n}",
      levelReadySub: "Speed rising — get ready!",
      lifeLost: "LIFE -1",
      livesLeft: "Left: {n}",
      powerShield: "SHIELD",
      powerSlow: "SLOW",
      powerMagnet: "MAGNET",
      powerMulti: "x2 SCORE",
      mobileHint: "Swipe / tap lanes · top half = jump"
    }
  };

  function t(key, vars) {
    var pack = I18N[LANG] || I18N.tr;
    var val = pack[key];
    if (val == null) val = I18N.tr[key] != null ? I18N.tr[key] : key;
    if (typeof val === "string" && vars) {
      Object.keys(vars).forEach(function (k) {
        val = val.replace(new RegExp("\\{" + k + "\\}", "g"), String(vars[k]));
      });
    }
    return val;
  }

  function applyLang(lang) {
    LANG = lang === "en" ? "en" : "tr";
    document.documentElement.lang = LANG;
    var pack = I18N[LANG];
    document.querySelectorAll("[data-i18n]").forEach(function (node) {
      var key = node.getAttribute("data-i18n");
      if (pack[key] != null && typeof pack[key] === "string") node.textContent = pack[key];
    });
    document.querySelectorAll("[data-i18n-title]").forEach(function (node) {
      var key = node.getAttribute("data-i18n-title");
      if (pack[key] != null) node.setAttribute("title", pack[key]);
    });
    var how = document.getElementById("howList");
    if (how) {
      how.innerHTML = "";
      (pack.howItems || []).forEach(function (item) {
        var li = document.createElement("li");
        li.innerHTML = item;
        how.appendChild(li);
      });
    }
    document.getElementById("btnLangTr").classList.toggle("is-on", LANG === "tr");
    document.getElementById("btnLangEn").classList.toggle("is-on", LANG === "en");
    if (typeof setSound === "function") setSound(state.soundOn, true);
  }

  // ============ STATE ============
  var LANES = 3;
  var DIST_PER_LEVEL = 500;
  var state = {
    mode: "menu",
    soundOn: true,
    score: 0,
    bestSession: 0,
    lives: 3,
    level: 1,
    distance: 0,
    running: false,
    lane: 1,
    targetLane: 1,
    x: 0,
    y: 0,
    jump: 0,
    jumpVel: 0,
    invuln: 0,
    shield: 0,
    slow: 0,
    magnet: 0,
    multi: 0,
    speed: 220,
    baseSpeed: 220,
    spawnTimer: 0,
    coinTimer: 0,
    powerTimer: 0,
    obstacles: [],
    coins: [],
    powers: [],
    particles: [],
    stars: [],
    gridOff: 0,
    shake: 0,
    flash: 0,
    lastTs: 0,
    dpr: 1,
    W: 480,
    H: 720,
    levelFlash: 0,
    touchStartX: 0,
    touchStartY: 0,
    keys: { left: false, right: false, jump: false }
  };

  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");
  var hud = document.getElementById("hud");
  var screens = {
    menu: document.getElementById("screenMenu"),
    how: document.getElementById("screenHow"),
    pause: document.getElementById("screenPause"),
    over: document.getElementById("screenOver")
  };

  // ============ AUDIO ============
  var audioCtx = null;
  var musicTimer = null;

  function ensureAudio() {
    if (audioCtx) return;
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    audioCtx = new AC();
  }

  function beep(freq, dur, type, gain, slide) {
    if (!state.soundOn || !audioCtx) return;
    var t0 = audioCtx.currentTime;
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = type || "square";
    o.frequency.setValueAtTime(freq, t0);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, slide), t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain || 0.08, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t0); o.stop(t0 + dur + 0.02);
  }

  function sfx(name) {
    if (!state.soundOn) return;
    ensureAudio();
    if (!audioCtx) return;
    if (name === "move") beep(280, 0.05, "square", 0.04);
    else if (name === "jump") beep(420, 0.1, "triangle", 0.07, 680);
    else if (name === "coin") { beep(880, 0.07, "square", 0.05); beep(1180, 0.08, "square", 0.04); }
    else if (name === "power") beep(360, 0.12, "sawtooth", 0.06, 720);
    else if (name === "hit") beep(120, 0.22, "sawtooth", 0.1, 50);
    else if (name === "level") { beep(520, 0.1, "square", 0.06); setTimeout(function () { beep(720, 0.12, "square", 0.06); }, 90); }
    else if (name === "over") beep(180, 0.4, "triangle", 0.08, 60);
  }

  function startMusic() {
    stopMusic();
    if (!state.soundOn) return;
    ensureAudio();
    if (!audioCtx) return;
    var notes = [196, 220, 247, 262, 294, 262, 247, 220];
    var i = 0;
    function tick() {
      if (!state.soundOn || state.mode !== "play") return;
      beep(notes[i % notes.length], 0.12, "triangle", 0.018);
      i++;
      musicTimer = setTimeout(tick, 220);
    }
    tick();
  }

  function stopMusic() {
    if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; }
  }

  function setSound(on, silent) {
    state.soundOn = !!on;
    var label = state.soundOn ? t("soundOn") : t("soundOff");
    var menuBtn = document.getElementById("btnSoundMenu");
    var hudBtn = document.getElementById("btnSoundHud");
    if (menuBtn) {
      menuBtn.textContent = label;
      menuBtn.classList.toggle("is-on", state.soundOn);
    }
    if (hudBtn) hudBtn.textContent = state.soundOn ? "🔊" : "🔇";
    if (!silent) {
      if (state.soundOn) { ensureAudio(); if (state.mode === "play") startMusic(); }
      else stopMusic();
    }
  }

  // ============ HELPERS ============
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function rand(a, b) { return a + Math.random() * (b - a); }
  function pick(arr) { return arr[(Math.random() * arr.length) | 0]; }

  function laneX(lane) {
    var pad = 48;
    var usable = state.W - pad * 2;
    var step = usable / (LANES - 1);
    return pad + lane * step;
  }

  function showScreen(name) {
    Object.keys(screens).forEach(function (k) {
      screens[k].classList.toggle("is-on", k === name);
    });
    hud.classList.toggle("is-on", name === null && state.mode === "play");
    var hint = document.getElementById("mobileHint");
    if (hint) {
      var touchy = window.matchMedia("(hover: none), (pointer: coarse)").matches;
      hint.classList.toggle("is-on", name === null && state.mode === "play" && touchy);
    }
  }

  function updateHud() {
    document.getElementById("hudScore").textContent = String(state.score | 0);
    document.getElementById("hudLives").textContent = String(state.lives);
    document.getElementById("hudLevel").textContent = String(state.level);
    document.getElementById("hudDist").textContent = String(state.distance | 0) + "m";
  }

  function showToast(title, text) {
    var el = document.getElementById("toast");
    document.getElementById("toastTitle").textContent = title;
    document.getElementById("toastText").textContent = text || "";
    el.classList.add("is-on");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(function () { el.classList.remove("is-on"); }, 1200);
  }

  function goMenu(reset) {
    state.mode = "menu";
    state.running = false;
    stopMusic();
    showScreen("menu");
    if (reset) resetRun(false);
  }

  function spawnBurst(x, y, color, n, speed) {
    for (var i = 0; i < n; i++) {
      var a = Math.random() * Math.PI * 2;
      var s = rand(speed * 0.3, speed);
      state.particles.push({
        x: x, y: y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: rand(0.25, 0.7),
        max: 0.7,
        r: rand(1.5, 3.5),
        color: color
      });
    }
  }

  function resetRun(startPlaying) {
    state.score = 0;
    state.lives = 3;
    state.level = 1;
    state.distance = 0;
    state.lane = 1;
    state.targetLane = 1;
    state.x = laneX(1);
    state.y = state.H * 0.78;
    state.jump = 0;
    state.jumpVel = 0;
    state.invuln = 0;
    state.shield = 0;
    state.slow = 0;
    state.magnet = 0;
    state.multi = 0;
    state.baseSpeed = 220;
    state.speed = 220;
    state.spawnTimer = 0.6;
    state.coinTimer = 0.4;
    state.powerTimer = 4;
    state.obstacles = [];
    state.coins = [];
    state.powers = [];
    state.particles = [];
    state.gridOff = 0;
    state.shake = 0;
    state.flash = 0;
    state.levelFlash = 0;
    if (!state.stars.length) {
      for (var i = 0; i < 48; i++) {
        state.stars.push({
          x: Math.random() * state.W,
          y: Math.random() * state.H,
          z: rand(0.3, 1.4),
          s: rand(0.6, 2.2)
        });
      }
    }
    updateHud();
    if (startPlaying) {
      state.mode = "play";
      state.running = true;
      showScreen(null);
      hud.classList.add("is-on");
      showToast(t("levelReady", { n: 1 }), t("levelReadySub"));
      startMusic();
    }
  }

  function startGame() {
    ensureAudio();
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    resetRun(true);
  }

  function pauseGame() {
    if (state.mode !== "play") return;
    state.mode = "pause";
    state.running = false;
    stopMusic();
    showScreen("pause");
  }

  function resumeGame() {
    if (state.mode !== "pause") return;
    state.mode = "play";
    state.running = true;
    showScreen(null);
    hud.classList.add("is-on");
    startMusic();
  }

  function gameOver() {
    state.mode = "over";
    state.running = false;
    stopMusic();
    sfx("over");
    if (state.score > state.bestSession) state.bestSession = state.score;
    document.getElementById("overTitle").textContent = t("gameOver");
    document.getElementById("overStats").textContent = t("stats", {
      score: state.score | 0,
      level: state.level,
      dist: state.distance | 0,
      best: state.bestSession | 0
    });
    showScreen("over");
  }

  // ============ FULLSCREEN ============
  function isFs() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement);
  }
  function enterFs() {
    var el = document.documentElement;
    var req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (req) req.call(el);
  }
  function exitFs() {
    var ex = document.exitFullscreen || document.webkitExitFullscreen;
    if (ex && isFs()) ex.call(document);
  }

  // ============ SPAWN ============
  function spawnObstacle() {
    var lane = (Math.random() * LANES) | 0;
    // occasionally dual-lane block at higher levels
    var kind = Math.random() < 0.18 + state.level * 0.02 ? "wide" : "block";
    var h = kind === "wide" ? 36 : rand(34, 52);
    var w = kind === "wide" ? 86 : 52;
    state.obstacles.push({
      lane: lane,
      y: -60,
      w: w,
      h: h,
      kind: kind,
      pulse: Math.random() * Math.PI * 2
    });
    if (state.level >= 3 && Math.random() < 0.22) {
      var other = (lane + 1 + ((Math.random() * (LANES - 1)) | 0)) % LANES;
      state.obstacles.push({
        lane: other, y: -60 - rand(80, 140), w: 48, h: 40, kind: "block", pulse: 0
      });
    }
  }

  function spawnCoin() {
    var lane = (Math.random() * LANES) | 0;
    state.coins.push({ lane: lane, y: -20, r: 10, magnet: false });
  }

  function spawnPower() {
    var types = ["shield", "slow", "magnet", "multi"];
    state.powers.push({
      lane: (Math.random() * LANES) | 0,
      y: -24,
      type: pick(types),
      r: 14,
      spin: 0
    });
  }

  // ============ UPDATE ============
  function update(dt) {
    var speedMul = state.slow > 0 ? 0.55 : 1;
    var spd = state.speed * speedMul;

    // timers
    if (state.invuln > 0) state.invuln -= dt;
    if (state.shield > 0) state.shield -= dt;
    if (state.slow > 0) state.slow -= dt;
    if (state.magnet > 0) state.magnet -= dt;
    if (state.multi > 0) state.multi -= dt;
    if (state.shake > 0) state.shake = Math.max(0, state.shake - dt * 8);
    if (state.flash > 0) state.flash = Math.max(0, state.flash - dt * 3);
    if (state.levelFlash > 0) state.levelFlash = Math.max(0, state.levelFlash - dt);

    // lane lerp
    var tx = laneX(state.targetLane);
    state.x += (tx - state.x) * Math.min(1, dt * 14);
    state.lane = state.targetLane;

    // jump
    if (state.keys.jump && state.jump === 0) {
      state.jumpVel = -420;
      state.jump = 0.001;
      sfx("jump");
      state.keys.jump = false;
    }
    if (state.jump > 0 || state.jumpVel !== 0) {
      state.jumpVel += 1400 * dt;
      state.jump += state.jumpVel * dt;
      if (state.jump >= 0) {
        state.jump = 0;
        state.jumpVel = 0;
      }
    }

    // progress
    var distGain = spd * dt * 0.12;
    state.distance += distGain;
    var scoreMul = state.multi > 0 ? 2 : 1;
    state.score += distGain * 2 * scoreMul;
    state.gridOff = (state.gridOff + spd * dt) % 48;

    // level up
    var wantLevel = 1 + Math.floor(state.distance / DIST_PER_LEVEL);
    if (wantLevel > state.level) {
      state.level = wantLevel;
      state.baseSpeed = 220 + (state.level - 1) * 28;
      state.speed = state.baseSpeed;
      state.levelFlash = 1.2;
      sfx("level");
      showToast(t("levelReady", { n: state.level }), t("levelReadySub"));
      spawnBurst(state.W / 2, state.H * 0.35, "#a78bfa", 28, 220);
    } else {
      state.speed = state.baseSpeed + Math.sin(state.distance * 0.02) * 8;
    }

    // spawn
    state.spawnTimer -= dt;
    state.coinTimer -= dt;
    state.powerTimer -= dt;
    var dens = Math.max(0.38, 0.85 - state.level * 0.04);
    if (state.spawnTimer <= 0) {
      spawnObstacle();
      state.spawnTimer = dens + Math.random() * 0.25;
    }
    if (state.coinTimer <= 0) {
      spawnCoin();
      state.coinTimer = 0.35 + Math.random() * 0.45;
    }
    if (state.powerTimer <= 0) {
      spawnPower();
      state.powerTimer = 7 + Math.random() * 5;
    }

    // move entities
    var py = state.y + state.jump;
    var pr = 18;

    for (var i = state.obstacles.length - 1; i >= 0; i--) {
      var o = state.obstacles[i];
      o.y += spd * dt;
      o.pulse += dt * 6;
      if (o.y > state.H + 80) { state.obstacles.splice(i, 1); continue; }
      if (state.invuln > 0) continue;
      var ox = laneX(o.lane);
      var halfW = o.w * 0.5;
      var halfH = o.h * 0.5;
      var dx = Math.abs(state.x - ox);
      var dy = Math.abs(py - (o.y + halfH * 0.2));
      if (dx < halfW * 0.72 + pr * 0.35 && dy < halfH * 0.7 + pr * 0.35 && state.jump > -28) {
        hitObstacle(o, i);
      }
    }

    for (var c = state.coins.length - 1; c >= 0; c--) {
      var coin = state.coins[c];
      coin.y += spd * dt;
      var cx = laneX(coin.lane);
      if (state.magnet > 0) {
        var mdx = state.x - cx;
        var mdy = py - coin.y;
        var md = Math.hypot(mdx, mdy) || 1;
        if (md < 180) {
          cx += mdx / md * 220 * dt;
          coin.y += mdy / md * 220 * dt;
          // store temporary visual x via lane float? keep simple: pull lane-less
          coin._x = (coin._x == null ? laneX(coin.lane) : coin._x) + mdx / md * 220 * dt;
        }
      }
      var drawX = coin._x != null ? coin._x : cx;
      if (coin.y > state.H + 40) { state.coins.splice(c, 1); continue; }
      if (Math.hypot(state.x - drawX, py - coin.y) < pr + coin.r) {
        state.score += 50 * scoreMul;
        sfx("coin");
        spawnBurst(drawX, coin.y, "#fbbf24", 10, 160);
        state.coins.splice(c, 1);
      }
    }

    for (var p = state.powers.length - 1; p >= 0; p--) {
      var pw = state.powers[p];
      pw.y += spd * dt;
      pw.spin += dt * 4;
      if (pw.y > state.H + 40) { state.powers.splice(p, 1); continue; }
      var px = laneX(pw.lane);
      if (Math.hypot(state.x - px, py - pw.y) < pr + pw.r) {
        applyPower(pw.type);
        spawnBurst(px, pw.y, powerColor(pw.type), 16, 200);
        state.powers.splice(p, 1);
      }
    }

    // particles
    for (var q = state.particles.length - 1; q >= 0; q--) {
      var pt = state.particles[q];
      pt.life -= dt;
      pt.x += pt.vx * dt;
      pt.y += pt.vy * dt;
      pt.vy += 40 * dt;
      if (pt.life <= 0) state.particles.splice(q, 1);
    }

    // trail particles while running
    if (Math.random() < 0.5) {
      state.particles.push({
        x: state.x + rand(-6, 6),
        y: py + 16,
        vx: rand(-20, 20),
        vy: rand(40, 100),
        life: 0.25,
        max: 0.25,
        r: rand(1, 2.4),
        color: state.shield > 0 ? "#67e8f9" : "#818cf8"
      });
    }

    updateHud();
  }

  function hitObstacle(o, index) {
    if (state.shield > 0) {
      state.shield = 0;
      state.invuln = 0.8;
      state.shake = 0.35;
      sfx("power");
      spawnBurst(laneX(o.lane), o.y, "#67e8f9", 20, 240);
      state.obstacles.splice(index, 1);
      return;
    }
    state.lives -= 1;
    state.invuln = 1.2;
    state.shake = 0.7;
    state.flash = 0.45;
    sfx("hit");
    spawnBurst(state.x, state.y + state.jump, "#fb7185", 24, 280);
    state.obstacles.splice(index, 1);
    showToast(t("lifeLost"), t("livesLeft", { n: state.lives }));
    updateHud();
    if (state.lives <= 0) gameOver();
  }

  function applyPower(type) {
    sfx("power");
    if (type === "shield") { state.shield = 6; showToast(t("powerShield"), "6s"); }
    else if (type === "slow") { state.slow = 4.5; showToast(t("powerSlow"), "4.5s"); }
    else if (type === "magnet") { state.magnet = 7; showToast(t("powerMagnet"), "7s"); }
    else if (type === "multi") { state.multi = 8; showToast(t("powerMulti"), "8s"); }
  }

  function powerColor(type) {
    if (type === "shield") return "#67e8f9";
    if (type === "slow") return "#a78bfa";
    if (type === "magnet") return "#f472b6";
    return "#fbbf24";
  }

  // ============ DRAW ============
  function draw() {
    var W = state.W, H = state.H;
    var dpr = state.dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    var sx = 0, sy = 0;
    if (state.shake > 0) {
      sx = (Math.random() - 0.5) * state.shake * 14;
      sy = (Math.random() - 0.5) * state.shake * 14;
    }
    ctx.save();
    ctx.translate(sx, sy);

    // sky
    var g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#070b1c");
    g.addColorStop(0.45, "#0b1535");
    g.addColorStop(1, "#050814");
    ctx.fillStyle = g;
    ctx.fillRect(-20, -20, W + 40, H + 40);

    // stars
    for (var i = 0; i < state.stars.length; i++) {
      var st = state.stars[i];
      st.y += state.speed * 0.015 * st.z * (state.running ? 1 : 0.15);
      if (st.y > H) { st.y = -4; st.x = Math.random() * W; }
      ctx.globalAlpha = 0.25 + st.z * 0.4;
      ctx.fillStyle = "#c4b5fd";
      ctx.fillRect(st.x, st.y, st.s, st.s);
    }
    ctx.globalAlpha = 1;

    // horizon glow
    var hg = ctx.createRadialGradient(W / 2, H * 0.22, 10, W / 2, H * 0.22, W * 0.55);
    hg.addColorStop(0, "rgba(34,211,238,0.22)");
    hg.addColorStop(0.5, "rgba(129,140,248,0.1)");
    hg.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = hg;
    ctx.fillRect(0, 0, W, H * 0.55);

    // perspective grid floor
    drawGridFloor();

    // lane markers near player
    for (var L = 0; L < LANES; L++) {
      var lx = laneX(L);
      ctx.strokeStyle = "rgba(34,211,238,0.12)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(lx, H * 0.28);
      ctx.lineTo(lx, H);
      ctx.stroke();
    }

    // entities
    state.coins.forEach(drawCoin);
    state.powers.forEach(drawPower);
    state.obstacles.forEach(drawObstacle);
    drawPlayer();
    state.particles.forEach(drawParticle);

    // CRT scanlines
    ctx.fillStyle = "rgba(0,0,0,0.08)";
    for (var y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);
    // vignette
    var vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.2, W / 2, H / 2, H * 0.75);
    vg.addColorStop(0, "rgba(0,0,0,0)");
    vg.addColorStop(1, "rgba(0,0,0,0.45)");
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);

    // hit flash
    if (state.flash > 0) {
      ctx.fillStyle = "rgba(248,113,113," + (state.flash * 0.35) + ")";
      ctx.fillRect(0, 0, W, H);
    }
    // level flash
    if (state.levelFlash > 0) {
      ctx.fillStyle = "rgba(167,139,250," + (state.levelFlash * 0.18) + ")";
      ctx.fillRect(0, 0, W, H);
    }

    // active buffs
    if (state.mode === "play") drawBuffBar();

    ctx.restore();
  }

  function drawGridFloor() {
    var W = state.W, H = state.H;
    var horizon = H * 0.26;
    var bottom = H + 20;
    var vanishX = W / 2;

    // floor plate
    var fg = ctx.createLinearGradient(0, horizon, 0, bottom);
    fg.addColorStop(0, "rgba(15,23,42,0.2)");
    fg.addColorStop(1, "rgba(8,47,73,0.35)");
    ctx.fillStyle = fg;
    ctx.beginPath();
    ctx.moveTo(0, bottom);
    ctx.lineTo(W, bottom);
    ctx.lineTo(vanishX + 40, horizon);
    ctx.lineTo(vanishX - 40, horizon);
    ctx.closePath();
    ctx.fill();

    // horizontal grid lines with scroll
    ctx.lineWidth = 1;
    for (var i = 0; i < 18; i++) {
      var t = ((i * 48 + state.gridOff) % (48 * 18)) / (48 * 18);
      var y = horizon + Math.pow(t, 1.35) * (bottom - horizon);
      var widen = (y - horizon) / (bottom - horizon);
      var half = 30 + widen * (W * 0.55);
      ctx.strokeStyle = "rgba(34,211,238," + (0.08 + widen * 0.28) + ")";
      ctx.beginPath();
      ctx.moveTo(vanishX - half, y);
      ctx.lineTo(vanishX + half, y);
      ctx.stroke();
    }

    // vertical perspective lines
    for (var v = -4; v <= 4; v++) {
      var edge = vanishX + v * 28;
      var bot = vanishX + v * (W * 0.13);
      ctx.strokeStyle = "rgba(129,140,248," + (v === 0 ? 0.22 : 0.12) + ")";
      ctx.beginPath();
      ctx.moveTo(edge, horizon);
      ctx.lineTo(bot, bottom);
      ctx.stroke();
    }

    // neon horizon bar
    ctx.strokeStyle = "rgba(34,211,238,0.55)";
    ctx.lineWidth = 2;
    ctx.shadowColor = "#22d3ee";
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.moveTo(40, horizon);
    ctx.lineTo(W - 40, horizon);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  function drawPlayer() {
    var x = state.x;
    var y = state.y + state.jump;
    var blink = state.invuln > 0 && Math.floor(state.invuln * 12) % 2 === 0;
    if (blink) return;

    // shadow
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.beginPath();
    ctx.ellipse(x, state.y + 18, 16 - Math.min(10, -state.jump * 0.05), 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // body
    ctx.save();
    ctx.translate(x, y);
    var bob = Math.sin(performance.now() / 90) * 1.5;
    ctx.translate(0, bob);

    // shield ring
    if (state.shield > 0) {
      ctx.strokeStyle = "rgba(103,232,249,0.75)";
      ctx.lineWidth = 3;
      ctx.shadowColor = "#67e8f9";
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.arc(0, 0, 26 + Math.sin(performance.now() / 120) * 2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // retro cube ship
    var body = ctx.createLinearGradient(-14, -16, 14, 16);
    body.addColorStop(0, "#67e8f9");
    body.addColorStop(0.5, "#818cf8");
    body.addColorStop(1, "#c084fc");
    ctx.fillStyle = body;
    ctx.strokeStyle = "rgba(255,255,255,0.45)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, -18);
    ctx.lineTo(16, 8);
    ctx.lineTo(0, 14);
    ctx.lineTo(-16, 8);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // cockpit
    ctx.fillStyle = "rgba(15,23,42,0.85)";
    ctx.fillRect(-5, -6, 10, 8);

    // thruster
    ctx.fillStyle = Math.random() > 0.4 ? "#f472b6" : "#fbbf24";
    ctx.beginPath();
    ctx.moveTo(-6, 14);
    ctx.lineTo(0, 14 + rand(8, 16));
    ctx.lineTo(6, 14);
    ctx.fill();

    ctx.restore();
  }

  function drawObstacle(o) {
    var x = laneX(o.lane);
    var y = o.y;
    var pulse = 0.7 + Math.sin(o.pulse) * 0.15;
    ctx.save();
    ctx.translate(x, y);
    ctx.shadowColor = "#f43f5e";
    ctx.shadowBlur = 12 * pulse;
    var grd = ctx.createLinearGradient(-o.w / 2, 0, o.w / 2, o.h);
    grd.addColorStop(0, "#fb7185");
    grd.addColorStop(1, "#9f1239");
    ctx.fillStyle = grd;
    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.lineWidth = 1.5;
    roundRect(-o.w / 2, 0, o.w, o.h, 6);
    ctx.fill();
    ctx.stroke();
    // pixel detail
    ctx.fillStyle = "rgba(255,255,255,0.15)";
    for (var i = 0; i < 4; i++) {
      ctx.fillRect(-o.w / 2 + 6 + i * 12, 8, 6, 6);
    }
    ctx.restore();
  }

  function drawCoin(c) {
    var x = c._x != null ? c._x : laneX(c.lane);
    var y = c.y;
    ctx.save();
    ctx.translate(x, y);
    ctx.shadowColor = "#fbbf24";
    ctx.shadowBlur = 10;
    ctx.fillStyle = "#fbbf24";
    ctx.beginPath();
    ctx.arc(0, 0, c.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#fef3c7";
    ctx.beginPath();
    ctx.arc(-2, -2, c.r * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawPower(p) {
    var x = laneX(p.lane);
    var y = p.y;
    var col = powerColor(p.type);
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(p.spin);
    ctx.shadowColor = col;
    ctx.shadowBlur = 14;
    ctx.fillStyle = col;
    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
      var a = (i / 6) * Math.PI * 2;
      var r = i % 2 === 0 ? p.r : p.r * 0.55;
      var px = Math.cos(a) * r;
      var py = Math.sin(a) * r;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    // label letter
    ctx.fillStyle = "#0f172a";
    ctx.font = "bold 11px Inter, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    var letter = p.type === "shield" ? "S" : p.type === "slow" ? "T" : p.type === "magnet" ? "M" : "2";
    ctx.fillText(letter, x, y);
  }

  function drawParticle(p) {
    ctx.globalAlpha = Math.max(0, p.life / (p.max || 0.5));
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function drawBuffBar() {
    var items = [];
    if (state.shield > 0) items.push({ c: "#67e8f9", t: state.shield });
    if (state.slow > 0) items.push({ c: "#a78bfa", t: state.slow });
    if (state.magnet > 0) items.push({ c: "#f472b6", t: state.magnet });
    if (state.multi > 0) items.push({ c: "#fbbf24", t: state.multi });
    if (!items.length) return;
    var x = 14, y = state.H - 22;
    items.forEach(function (it, i) {
      var bx = x + i * 70;
      ctx.fillStyle = "rgba(2,8,20,0.65)";
      ctx.strokeStyle = it.c;
      ctx.lineWidth = 1.5;
      roundRect(bx, y - 10, 62, 16, 8);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = it.c;
      ctx.fillRect(bx + 4, y - 3, Math.max(2, 54 * Math.min(1, it.t / 8)), 4);
    });
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ============ LOOP ============
  function loop(ts) {
    if (!state.lastTs) state.lastTs = ts;
    var dt = Math.min(0.033, (ts - state.lastTs) / 1000);
    state.lastTs = ts;
    if (state.mode === "play" && state.running) update(dt);
    else if (state.mode === "menu" || state.mode === "how" || state.mode === "pause" || state.mode === "over") {
      // idle parallax
      state.gridOff = (state.gridOff + 40 * dt) % 48;
      for (var i = 0; i < state.stars.length; i++) {
        state.stars[i].y += 12 * dt * state.stars[i].z;
        if (state.stars[i].y > state.H) {
          state.stars[i].y = -4;
          state.stars[i].x = Math.random() * state.W;
        }
      }
    }
    draw();
    requestAnimationFrame(loop);
  }

  function resize() {
    state.W = 480;
    state.H = 720;
    state.dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.round(state.W * state.dpr);
    canvas.height = Math.round(state.H * state.dpr);
    state.y = state.H * 0.78;
    if (!state.x) state.x = laneX(1);
  }

  // ============ INPUT ============
  function moveLane(dir) {
    if (state.mode !== "play" || !state.running) return;
    var next = clamp(state.targetLane + dir, 0, LANES - 1);
    if (next !== state.targetLane) {
      state.targetLane = next;
      sfx("move");
    }
  }

  function doJump() {
    if (state.mode !== "play" || !state.running) return;
    if (state.jump === 0) state.keys.jump = true;
  }

  function canvasLaneFromClientX(clientX) {
    var rect = canvas.getBoundingClientRect();
    var scale = Math.min(rect.width / state.W, rect.height / state.H);
    var ox = rect.left + (rect.width - state.W * scale) / 2;
    var x = (clientX - ox) / scale;
    var best = 0, bestD = 1e9;
    for (var i = 0; i < LANES; i++) {
      var d = Math.abs(laneX(i) - x);
      if (d < bestD) { bestD = d; best = i; }
    }
    return best;
  }

  window.addEventListener("keydown", function (e) {
    if (e.code === "ArrowLeft" || e.code === "KeyA") {
      e.preventDefault();
      moveLane(-1);
    }
    if (e.code === "ArrowRight" || e.code === "KeyD") {
      e.preventDefault();
      moveLane(1);
    }
    if (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") {
      e.preventDefault();
      if (state.mode === "play") doJump();
      else if (state.mode === "pause") resumeGame();
    }
    if (e.code === "Escape") {
      e.preventDefault();
      handleExit();
      return;
    }
    if (e.code === "KeyP") {
      e.preventDefault();
      if (state.mode === "play") pauseGame();
      else if (state.mode === "pause") resumeGame();
    }
  });

  canvas.addEventListener("mousedown", function (e) {
    if (state.mode !== "play") return;
    var rect = canvas.getBoundingClientRect();
    var scale = Math.min(rect.width / state.W, rect.height / state.H);
    var oy = rect.top + (rect.height - state.H * scale) / 2;
    var y = (e.clientY - oy) / scale;
    if (y < state.H * 0.42) doJump();
    else {
      state.targetLane = canvasLaneFromClientX(e.clientX);
      sfx("move");
    }
  });

  canvas.addEventListener("touchstart", function (e) {
    if (!e.touches[0]) return;
    state.touchStartX = e.touches[0].clientX;
    state.touchStartY = e.touches[0].clientY;
  }, { passive: true });

  canvas.addEventListener("touchend", function (e) {
    if (state.mode !== "play") return;
    var t = e.changedTouches && e.changedTouches[0];
    if (!t) return;
    var dx = t.clientX - state.touchStartX;
    var dy = t.clientY - state.touchStartY;
    if (Math.abs(dx) > 28 && Math.abs(dx) > Math.abs(dy)) {
      moveLane(dx > 0 ? 1 : -1);
    } else if (dy < -36 && Math.abs(dy) > Math.abs(dx)) {
      doJump();
    } else {
      var rect = canvas.getBoundingClientRect();
      var scale = Math.min(rect.width / state.W, rect.height / state.H);
      var oy = rect.top + (rect.height - state.H * scale) / 2;
      var y = (t.clientY - oy) / scale;
      if (y < state.H * 0.42) doJump();
      else {
        state.targetLane = canvasLaneFromClientX(t.clientX);
        sfx("move");
      }
    }
  }, { passive: true });

  function handleExit() {
    if (state.mode === "play") {
      state.mode = "pause";
      state.running = false;
      stopMusic();
    }
    if (isFs()) exitFs();
    goMenu(false);
  }

  document.addEventListener("fullscreenchange", onFsChange);
  document.addEventListener("webkitfullscreenchange", onFsChange);
  function onFsChange() {
    if (!isFs() && state.mode === "play") pauseGame();
  }

  function leaveToArcade() {
    stopMusic();
    if (isFs()) exitFs();
    window.location.href = "/mini-oyunlar/";
  }

  // ============ BUTTONS ============
  document.getElementById("btnStart").onclick = function () {
    ensureAudio();
    startGame();
  };
  document.getElementById("btnFullscreen").onclick = function () {
    ensureAudio();
    enterFs();
    startGame();
  };
  document.getElementById("btnHow").onclick = function () {
    state.mode = "how";
    showScreen("how");
  };
  document.getElementById("btnHowBack").onclick = function () { goMenu(false); };
  document.getElementById("btnExitMenu").onclick = leaveToArcade;
  document.getElementById("btnResume").onclick = resumeGame;
  document.getElementById("btnRestart").onclick = function () { startGame(); };
  document.getElementById("btnPauseMenu").onclick = function () { goMenu(true); };
  document.getElementById("btnPauseExit").onclick = leaveToArcade;
  document.getElementById("btnReplay").onclick = function () { startGame(); };
  document.getElementById("btnOverMenu").onclick = function () { goMenu(true); };
  document.getElementById("btnOverHome").onclick = leaveToArcade;
  document.getElementById("btnPause").onclick = pauseGame;
  document.getElementById("btnExit").onclick = handleExit;
  document.getElementById("btnSoundMenu").onclick = function () { setSound(!state.soundOn); };
  document.getElementById("btnSoundHud").onclick = function () { setSound(!state.soundOn); };
  document.getElementById("btnLangTr").onclick = function () { applyLang("tr"); };
  document.getElementById("btnLangEn").onclick = function () { applyLang("en"); };

  // init
  for (var s = 0; s < 48; s++) {
    state.stars.push({
      x: Math.random() * 480,
      y: Math.random() * 720,
      z: rand(0.3, 1.4),
      s: rand(0.6, 2.2)
    });
  }
  resize();
  window.addEventListener("resize", resize);
  applyLang("tr");
  showScreen("menu");
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
