<!DOCTYPE html><html><head><meta charset="utf-8">
<style>html,body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block;width:1280px;height:720px}</style>
</head><body><canvas id="c" width="1280" height="720"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const W=1280,H=720; c.width=W;c.height=H;
const bg=x.createLinearGradient(0,0,0,H); bg.addColorStop(0,'#2a1608'); bg.addColorStop(1,'#120804'); x.fillStyle=bg; x.fillRect(0,0,W,H);
const cols=4,rows=3,bw=220,bh=180,ox=(W-cols*bw)/2,oy=(H-rows*bh)/2;
const faces=[
 ['open','diamond','#22d3ee'],['open','circle','#f472b6'],['closed',null,'#1e1612'],['open','diamond','#22d3ee'],
 ['closed',null,'#1e1612'],['open','tri','#a78bfa'],['closed',null,'#1e1612'],['closed',null,'#1e1612'],
 ['open','sq','#fbbf24'],['closed',null,'#1e1612'],['closed',null,'#1e1612'],['open','star','#4ade80']
];
let i=0;
for(let y=0;y<rows;y++)for(let xx=0;xx<cols;xx++){
  const [st,kind,col]=faces[i++]; const x0=ox+xx*bw+14,y0=oy+y*bh+14,w=bw-28,h=bh-28;
  if(st==='closed'){x.fillStyle=col; x.strokeStyle='#fb923c'; x.lineWidth=4; rrect(x,x0,y0,w,h,16); x.fill(); x.stroke();
    const cx=x0+w/2,cy=y0+h/2; x.beginPath(); x.arc(cx,cy,18,0,7); x.stroke(); x.beginPath(); x.arc(cx,cy,6,0,7); x.fillStyle='#fb923c'; x.fill();
  } else {
    x.fillStyle=col; x.shadowColor=col; x.shadowBlur=16; rrect(x,x0,y0,w,h,16); x.fill(); x.shadowBlur=0;
    const cx=x0+w/2,cy=y0+h/2; x.fillStyle='#0f172a';
    if(kind==='circle'){x.beginPath();x.arc(cx,cy,30,0,7);x.fill();}
    else if(kind==='sq'){x.fillRect(cx-26,cy-26,52,52);}
    else if(kind==='tri'){x.beginPath();x.moveTo(cx,cy-32);x.lineTo(cx+32,cy+26);x.lineTo(cx-32,cy+26);x.fill();}
    else if(kind==='star'){x.beginPath();x.arc(cx,cy,28,0,7);x.fill();x.fillStyle=col;x.beginPath();x.arc(cx,cy,10,0,7);x.fill();}
    else {x.beginPath();x.moveTo(cx,cy-32);x.lineTo(cx+26,cy);x.lineTo(cx,cy+32);x.lineTo(cx-26,cy);x.fill();}
  }
}
function rrect(ctx,x0,y0,w,h,r){ctx.beginPath();ctx.moveTo(x0+r,y0);ctx.arcTo(x0+w,y0,x0+w,y0+h,r);ctx.arcTo(x0+w,y0+h,x0,y0+h,r);ctx.arcTo(x0,y0+h,x0,y0,r);ctx.arcTo(x0,y0,x0+w,y0,r);ctx.closePath();}
</script></body></html>
