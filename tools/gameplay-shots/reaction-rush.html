<!DOCTYPE html><html><head><meta charset="utf-8">
<style>html,body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block;width:1280px;height:720px}</style>
</head><body><canvas id="c" width="1280" height="720"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const W=1280,H=720; c.width=W;c.height=H;
const bg=x.createLinearGradient(0,0,0,H); bg.addColorStop(0,'#2a0c12'); bg.addColorStop(1,'#100408'); x.fillStyle=bg; x.fillRect(0,0,W,H);
x.fillStyle='#16a34a'; x.shadowColor='#22c55e'; x.shadowBlur=40;
rrect(x,100,110,W-200,H-250,40); x.fill();
x.shadowBlur=0; x.strokeStyle='#86efac'; x.lineWidth=8; rrect(x,140,150,W-280,H-330,30); x.stroke();
const cx=W/2,cy=H/2;
for(let r=150;r>30;r-=16){x.strokeStyle=`rgba(187,247,208,${0.2+r/400})`; x.beginPath(); x.arc(cx,cy,r,0,7); x.stroke();}
x.fillStyle='#bbf7d0'; x.beginPath(); x.arc(cx,cy,40,0,7); x.fill();
// top chips shapes only
x.fillStyle='rgba(2,8,20,0.75)'; rrect(x,40,28,100,32,16); x.fill(); rrect(x,160,28,80,32,16); x.fill();
x.fillStyle='#4ade80'; x.fillRect(56,40,60,8); x.fillRect(176,40,40,8);
function rrect(ctx,x0,y0,w,h,r){ctx.beginPath();ctx.moveTo(x0+r,y0);ctx.arcTo(x0+w,y0,x0+w,y0+h,r);ctx.arcTo(x0+w,y0+h,x0,y0+h,r);ctx.arcTo(x0,y0+h,x0,y0,r);ctx.arcTo(x0,y0,x0+w,y0,r);ctx.closePath();}
</script></body></html>
