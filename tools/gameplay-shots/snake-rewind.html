<!DOCTYPE html><html><head><meta charset="utf-8">
<style>html,body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block;width:1280px;height:720px}</style>
</head><body><canvas id="c" width="1280" height="720"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const W=1280,H=720,CELL=36; c.width=W;c.height=H;
x.fillStyle='#031810'; x.fillRect(0,0,W,H);
for(let i=0;i<W;i+=CELL){x.strokeStyle='rgba(34,211,238,0.08)';x.beginPath();x.moveTo(i,0);x.lineTo(i,H);x.stroke();}
for(let j=0;j<H;j+=CELL){x.strokeStyle='rgba(34,211,238,0.08)';x.beginPath();x.moveTo(0,j);x.lineTo(W,j);x.stroke();}
const path=[[5,8],[6,8],[7,8],[8,8],[9,8],[10,8],[10,9],[10,10],[11,10],[12,10],[13,10],[14,10],[15,10],[16,10],[17,10],[18,10]];
path.forEach((p,i)=>{const t=i/(path.length-1); const g=`rgb(${30+t*40|0},${200-t*40|0},${120+t*40|0})`; x.fillStyle=g; x.shadowColor=g; x.shadowBlur=10;
  round(x,p[0]*CELL+4,p[1]*CELL+4,CELL-8,CELL-8,8); x.fill();});
x.shadowBlur=0;
// eyes
const h=path[path.length-1]; x.fillStyle='#04120c'; x.beginPath(); x.arc(h[0]*CELL+12,h[1]*CELL+14,3,0,7); x.arc(h[0]*CELL+22,h[1]*CELL+14,3,0,7); x.fill();
// food
x.fillStyle='#fbbf24'; x.shadowColor='#fbbf24'; x.shadowBlur=14; x.beginPath(); x.arc(24*CELL+CELL/2,6*CELL+CELL/2,12,0,7); x.fill();
// walls
x.shadowBlur=0; [[4,4],[5,4],[20,12],[21,12],[21,13],[28,7],[8,14]].forEach(w=>{x.fillStyle='#a78bfa'; round(x,w[0]*CELL+3,w[1]*CELL+3,CELL-6,CELL-6,4); x.fill();});
function round(ctx,x0,y0,w,h,r){ctx.beginPath();ctx.moveTo(x0+r,y0);ctx.arcTo(x0+w,y0,x0+w,y0+h,r);ctx.arcTo(x0+w,y0+h,x0,y0+h,r);ctx.arcTo(x0,y0+h,x0,y0,r);ctx.arcTo(x0,y0,x0+w,y0,r);ctx.closePath();}
</script></body></html>
